<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="gradWarm" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#a16207" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#0c0a09" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="gradLeather" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#7c2d12" stop-opacity="0.20" />
      <stop offset="100%" stop-color="#0c0a09" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0c0a09" />
  <rect width="1200" height="630" fill="url(#gradWarm)" />
  <rect width="1200" height="630" fill="url(#gradLeather)" />

  <!-- top label -->
  <text x="80" y="100" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" fill="#a8a29e" letter-spacing="2">
    bronco-drift
  </text>

  <!-- main title -->
  <text x="80" y="270" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="100" fill="#fafaf9" font-weight="500">
    Apps funcionales,
  </text>
  <text x="80" y="380" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="100" fill="#fafaf9" font-weight="500">
    hermosas y gratis.
  </text>

  <!-- subtitle -->
  <text x="80" y="460" font-family="ui-sans-serif, system-ui, sans-serif" font-size="26" fill="#a8a29e">
    Una plataforma. Un módulo por nicho.
  </text>

  <!-- module chips -->
  <g transform="translate(80, 510)">
    <!-- Freud -->
    <rect x="0" y="0" width="180" height="50" rx="10" fill="rgba(161, 98, 7, 0.18)" stroke="rgba(161, 98, 7, 0.50)" stroke-width="1.5" />
    <text x="90" y="33" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#fbbf24" text-anchor="middle">
      Freud
    </text>

    <!-- Sello / Firma Digital -->
    <rect x="200" y="0" width="280" height="50" rx="10" fill="rgba(124, 45, 18, 0.18)" stroke="rgba(124, 45, 18, 0.50)" stroke-width="1.5" />
    <text x="340" y="33" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#fb923c" text-anchor="middle">
      Firma Digital Simple
    </text>

    <!-- Más por venir -->
    <rect x="500" y="0" width="180" height="50" rx="10" fill="rgba(168, 162, 158, 0.10)" stroke="rgba(168, 162, 158, 0.30)" stroke-width="1.5" />
    <text x="590" y="33" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" fill="#a8a29e" text-anchor="middle">
      Próximamente
    </text>
  </g>

  <!-- decorative corner mark -->
  <g transform="translate(1080, 100)" stroke="#a16207" stroke-width="2" fill="none" opacity="0.4">
    <circle cx="0" cy="0" r="40" />
    <circle cx="0" cy="0" r="30" />
    <circle cx="0" cy="0" r="20" />
  </g>
</svg>
